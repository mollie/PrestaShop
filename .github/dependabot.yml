version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    target-branch: develop
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: "/views/assets"
    schedule:
      interval: weekly
    target-branch: develop
    open-pull-requests-limit: 10

  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
    target-branch: develop
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: develop
    open-pull-requests-limit: 5
